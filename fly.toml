app = "union-local-1285"
primary_region = "ord"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"
  # ADMIN_PASSWORD must be set as a Fly secret — never committed here.
  # Run once after deploy: fly secrets set ADMIN_PASSWORD=<strong-random-value>
  # ADMIN_USERNAME defaults to "admin" if not set (also injectable as a secret).

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/healthz"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
