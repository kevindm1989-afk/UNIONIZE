app = "union-local-1285"
primary_region = "ord"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"
  # Required secrets — set via: fly secrets set KEY=value
  # DATABASE_URL
  # SESSION_SECRET
  # ADMIN_PASSWORD
  # PORTAL_URL
  # EMAIL_FROM
  # SMTP_USER — Gmail address for email delivery (e.g. yourname@gmail.com)
  # SMTP_PASS — Gmail App Password (not your regular password)
  # VAPID_PUBLIC_KEY
  # VAPID_PRIVATE_KEY
  # VAPID_CONTACT_EMAIL — mailto: address for VAPID (defaults to admin@unionlocal.org)
  # ALLOWED_ORIGINS — comma-separated list of allowed CORS origins
  #   e.g. https://union-local-1285.fly.dev,https://custom.domain.com
  #   Defaults to https://union-local-1285.fly.dev if not set
  # Optional — SMS disabled if missing:
  # TWILIO_ACCOUNT_SID
  # TWILIO_AUTH_TOKEN
  # TWILIO_FROM
  # Optional — S3 storage falls back to local disk if missing:
  # AWS_ACCESS_KEY_ID
  # AWS_SECRET_ACCESS_KEY
  # BUCKET_NAME
  # AWS_ENDPOINT_URL_S3
  # AWS_REGION

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/healthz"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
