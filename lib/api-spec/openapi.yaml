components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict with existing resource
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Member:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        employeeId:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        classification:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        joinDate:
          type: string
          format: date
          nullable: true
        isActive:
          type: boolean
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, isActive, createdAt, updatedAt]

    CreateMemberBody:
      type: object
      properties:
        name:
          type: string
        employeeId:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        classification:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        joinDate:
          type: string
          format: date
          nullable: true
        isActive:
          type: boolean
          default: true
        notes:
          type: string
          nullable: true
      required: [name]

    UpdateMemberBody:
      type: object
      properties:
        name:
          type: string
        employeeId:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        classification:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        joinDate:
          type: string
          format: date
          nullable: true
        isActive:
          type: boolean
        notes:
          type: string
          nullable: true

    Grievance:
      type: object
      properties:
        id:
          type: integer
        grievanceNumber:
          type: string
        memberId:
          type: integer
          nullable: true
        memberName:
          type: string
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        contractArticle:
          type: string
          nullable: true
        step:
          type: integer
        status:
          type: string
          enum: [open, pending_response, pending_hearing, resolved, withdrawn]
        filedDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
          nullable: true
        resolvedDate:
          type: string
          format: date
          nullable: true
        resolution:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, grievanceNumber, title, step, status, filedDate, createdAt, updatedAt]

    CreateGrievanceBody:
      type: object
      properties:
        memberId:
          type: integer
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        contractArticle:
          type: string
          nullable: true
        step:
          type: integer
          default: 1
        status:
          type: string
          enum: [open, pending_response, pending_hearing, resolved, withdrawn]
          default: open
        filedDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true
      required: [title, filedDate]

    UpdateGrievanceBody:
      type: object
      properties:
        memberId:
          type: integer
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        contractArticle:
          type: string
          nullable: true
        step:
          type: integer
        status:
          type: string
          enum: [open, pending_response, pending_hearing, resolved, withdrawn]
        filedDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
          nullable: true
        resolvedDate:
          type: string
          format: date
          nullable: true
        resolution:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    GrievancesSummary:
      type: object
      properties:
        total:
          type: integer
        open:
          type: integer
        pending_response:
          type: integer
        pending_hearing:
          type: integer
        resolved:
          type: integer
        withdrawn:
          type: integer
        overdue:
          type: integer
        step1:
          type: integer
        step2:
          type: integer
        step3:
          type: integer
