openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Union Local 1285 Steward App
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: members
    description: Union member management
  - name: grievances
    description: Grievance tracking
  - name: announcements
    description: Union bulletins and announcements
  - name: dashboard
    description: Dashboard summaries
  - name: storage
    description: Object storage upload URL
  - name: documents
    description: CBA document management
  - name: anthropic
    description: Anthropic AI chat operations
  - name: auth
    description: Authentication, access requests, and user management
  - name: meetings
    description: Union meetings management
  - name: polls
    description: Member polls and voting
  - name: coverage
    description: Steward coverage and bargaining unit map
  - name: stats
    description: Statistics and reporting
  - name: member-portal
    description: Member self-service portal
  - name: push
    description: Push notifications
  - name: journal
    description: Case journal entries
  - name: just-cause
    description: Just cause assessment
  - name: communications
    description: Member communication log
  - name: discipline
    description: Discipline records
  - name: onboarding
    description: Member onboarding checklist
  - name: grievance-templates
    description: Grievance filing templates
  - name: settings
    description: Application settings
  - name: audit-logs
    description: Audit log

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all members
      parameters:
        - in: query
          name: department
          schema:
            type: string
        - in: query
          name: classification
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createMember
      tags: [members]
      summary: Add a new member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberBody"
      responses:
        "201":
          description: Created member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/{id}:
    get:
      operationId: getMember
      tags: [members]
      summary: Get a member by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Not found
    patch:
      operationId: updateMember
      tags: [members]
      summary: Update a member
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberBody"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
    delete:
      operationId: deleteMember
      tags: [members]
      summary: Remove a member
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /members/{id}/grievances:
    get:
      operationId: getMemberGrievances
      tags: [members]
      summary: Get grievances for a specific member
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of grievances for member
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grievance"

  /grievances:
    get:
      operationId: listGrievances
      tags: [grievances]
      summary: List all grievances
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [open, pending_response, pending_hearing, resolved, withdrawn]
        - in: query
          name: step
          schema:
            type: integer
        - in: query
          name: memberId
          schema:
            type: integer
      responses:
        "200":
          description: List of grievances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grievance"
    post:
      operationId: createGrievance
      tags: [grievances]
      summary: File a new grievance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGrievanceBody"
      responses:
        "201":
          description: Filed grievance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grievance"

  /grievances/{id}:
    get:
      operationId: getGrievance
      tags: [grievances]
      summary: Get a grievance by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Grievance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grievance"
        "404":
          description: Not found
    patch:
      operationId: updateGrievance
      tags: [grievances]
      summary: Update a grievance
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGrievanceBody"
      responses:
        "200":
          description: Updated grievance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grievance"
    delete:
      operationId: deleteGrievance
      tags: [grievances]
      summary: Delete a grievance
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /grievances/stats/summary:
    get:
      operationId: getGrievancesSummary
      tags: [grievances]
      summary: Get grievance statistics
      responses:
        "200":
          description: Grievance stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrievancesSummary"

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      parameters:
        - in: query
          name: category
          schema:
            type: string
            enum: [general, urgent, contract, meeting, action]
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Post a new announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementBody"
      responses:
        "201":
          description: Created announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    get:
      operationId: getAnnouncement
      tags: [announcements]
      summary: Get an announcement by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    patch:
      operationId: updateAnnouncement
      tags: [announcements]
      summary: Update an announcement
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAnnouncementBody"
      responses:
        "200":
          description: Updated announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent grievances and announcements
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentActivity"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all CBA documents
      responses:
        "200":
          description: Documents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Save document metadata after upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update document metadata
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentBody"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted


  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"

  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"

  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  # ── AUTH / ACCESS REQUESTS ───────────────────────────────────────────────────

  /auth/request-access:
    post:
      operationId: postApiAuthRequestAccess
      tags: [auth]
      summary: Submit a new portal access request (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccessRequestBody"
      responses:
        "201":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/access-requests:
    get:
      operationId: getApiAccessRequests
      tags: [auth]
      summary: List access requests (admin)
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: List of access requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/access-requests/{id}:
    get:
      operationId: getApiAccessRequestsId
      tags: [auth]
      summary: Get a single access request
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Access request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteApiAccessRequestsId
      tags: [auth]
      summary: Reject and delete an access request (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/access-requests/{id}/approve:
    patch:
      operationId: patchApiAccessRequestsIdApprove
      tags: [auth]
      summary: Approve an access request and create user account (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveAccessRequestBody"
      responses:
        "200":
          description: User created with temporary password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveAccessRequestResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/access-requests/{id}/reject:
    patch:
      operationId: patchApiAccessRequestsIdReject
      tags: [auth]
      summary: Reject an access request (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectAccessRequestBody"
      responses:
        "200":
          description: Request rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── AUTH / USERS ──────────────────────────────────────────────────────────────

  /auth/users:
    get:
      operationId: getApiAuthUsers
      tags: [auth]
      summary: List all portal users (admin)
      parameters:
        - in: query
          name: memberId
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthUser"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: postApiAuthUsers
      tags: [auth]
      summary: Create a portal user manually (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuthUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/users/{id}:
    patch:
      operationId: patchApiAuthUsersId
      tags: [auth]
      summary: Update a user (toggle active, change role, reset password) (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAuthUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/roles:
    get:
      operationId: getApiAuthRoles
      tags: [auth]
      summary: List all roles and their permissions
      responses:
        "200":
          description: Roles list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RolePermissions"

  /auth/permissions:
    get:
      operationId: getApiAuthPermissions
      tags: [auth]
      summary: Get current user permissions
      responses:
        "200":
          description: Permissions for authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPermissions"

  # ── MEETINGS ─────────────────────────────────────────────────────────────────

  /meetings:
    get:
      operationId: getApiMeetings
      tags: [meetings]
      summary: List meetings
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [executive, general, stewards]
        - in: query
          name: upcoming
          schema:
            type: boolean
      responses:
        "200":
          description: List of meetings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meeting"
    post:
      operationId: postApiMeetings
      tags: [meetings]
      summary: Create a meeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeetingBody"
      responses:
        "201":
          description: Created meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"

  /meetings/{id}:
    get:
      operationId: getApiMeetingsId
      tags: [meetings]
      summary: Get a meeting by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchApiMeetingsId
      tags: [meetings]
      summary: Update a meeting
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeetingBody"
      responses:
        "200":
          description: Updated meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"
    delete:
      operationId: deleteApiMeetingsId
      tags: [meetings]
      summary: Delete a meeting
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ── POLLS ─────────────────────────────────────────────────────────────────────

  /polls:
    get:
      operationId: getApiPolls
      tags: [polls]
      summary: List active polls
      responses:
        "200":
          description: List of polls with user response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PollWithResponse"
    post:
      operationId: postApiPolls
      tags: [polls]
      summary: Create a poll (admin/chair only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePollBody"
      responses:
        "201":
          description: Created poll
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"

  /polls/{id}:
    get:
      operationId: getApiPollsId
      tags: [polls]
      summary: Get a poll by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Poll
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchApiPollsId
      tags: [polls]
      summary: Update a poll (admin/chair only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePollBody"
      responses:
        "200":
          description: Updated poll
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"
    delete:
      operationId: deleteApiPollsId
      tags: [polls]
      summary: Delete a poll (admin/chair only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /polls/{id}/respond:
    post:
      operationId: postApiPollsIdRespond
      tags: [polls]
      summary: Submit a vote on a poll
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
