<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep navy background -->
  <rect width="180" height="180" rx="36" fill="#1e3769"/>

  <!-- Gold shield (outer shadow layer) -->
  <path d="M90 20 L156 44 L156 108 Q156 143 90 163 Q24 143 24 108 L24 44 Z" fill="#b8860b"/>

  <!-- Gold shield (main face) -->
  <path d="M90 27 L149 49 L149 107 Q149 138 90 156 Q31 138 31 107 L31 49 Z" fill="#f5a623"/>

  <!-- Shield inner highlight at top -->
  <path d="M90 36 L141 55 L141 70 Q116 63 90 63 Q64 63 39 70 L39 55 Z" fill="#fbbf47" fill-opacity="0.5"/>

  <!-- Raised fist in white, centered inside shield -->

  <!-- Pinky finger -->
  <rect x="66" y="72" width="11" height="26" rx="5.5" fill="white"/>
  <!-- Ring finger -->
  <rect x="77" y="65" width="11" height="33" rx="5.5" fill="white"/>
  <!-- Middle finger -->
  <rect x="88" y="63" width="11" height="35" rx="5.5" fill="white"/>
  <!-- Index finger -->
  <rect x="99" y="67" width="11" height="31" rx="5.5" fill="white"/>

  <!-- Palm -->
  <rect x="66" y="94" width="46" height="44" rx="10" fill="white"/>

  <!-- Thumb (right side) -->
  <rect x="111" y="91" width="10" height="22" rx="5" fill="white" transform="rotate(12 116 102)"/>

  <!-- Knuckle line (subtle gold line separating fingers from palm) -->
  <path d="M68 94 Q90 87 110 94" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Wrist taper at bottom -->
  <path d="M70 138 Q90 142 110 138 L110 143 Q90 148 70 143 Z" fill="#f5a623" fill-opacity="0.3"/>
</svg>
